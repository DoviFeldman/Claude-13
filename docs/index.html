<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>Storm Map</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="map"></div>

<header id="topbar">
  <span id="status">Loading strikes…</span>
  <button id="refresh" title="Refresh strike data">↻</button>
</header>

<nav id="toolbar">
  <button id="btn-home" title="Set your location">📍 Home</button>
  <button id="btn-measure" title="Measure distance between two taps">📏 Measure</button>
  <span id="src-toggles"></span>
</nav>

<div id="measure-readout" hidden></div>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
